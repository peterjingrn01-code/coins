<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>JSL-ian Technologies</title>
<meta name="description" content="JSL-ian Technologies homepage and browser gateway.">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;min-height:100%;background:#fff;color:#4b5563;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center}
.page{width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 18px 26px}
.center{width:100%;max-width:640px;text-align:center;margin-top:auto;margin-bottom:auto;transform:translateY(-14px)}
.logo{width:min(64vw,360px);max-width:360px;height:auto;display:block;margin:0 auto 36px}
.search-form{width:min(86vw,560px);height:68px;margin:0 auto;display:flex;align-items:center;border:1px solid #d9dce3;border-radius:999px;background:#fff;box-shadow:0 10px 28px rgba(17,24,39,.10);padding:0 20px}
.icon{width:28px;height:28px;flex:0 0 28px;color:#4b5563}
.search-input{flex:1;border:0;outline:0;background:transparent;color:#4b5563;font-size:24px;line-height:1;padding:0 16px;min-width:0}
.search-input::placeholder{color:#6b7280;opacity:.9}
.go{border:0;background:transparent;color:#2f3540;font-size:44px;line-height:1;cursor:pointer;padding:0 0 5px 8px}
.footer{text-align:center;font-size:20px;line-height:1.55;color:#4b5563;margin-top:auto;padding-bottom:8px}
.footer .tm{margin-top:2px}
@media (max-width:520px){
  .page{padding-top:28px;padding-bottom:22px}
  .center{transform:translateY(-10px)}
  .logo{width:64vw;margin-bottom:30px}
  .search-form{width:86vw;height:62px;padding:0 16px}
  .icon{width:25px;height:25px;flex-basis:25px}
  .search-input{font-size:22px;padding:0 13px}
  .go{font-size:40px}
  .footer{font-size:18px}
  .footer .tm{margin-top:8px}
}

  /* JSL-ian Slogan */

.jsl-slogan{
    margin-top:38px;
    margin-bottom:28px;
    text-align:center;
    color:#5f6368;
    line-height:1.8;
}

.jsl-slogan p{
    margin:6px 0;
    font-size:18px;
    font-weight:500;
    letter-spacing:.3px;
}

  .quick-links{
  text-align:center;
  margin-top:24px;
  font-size:13px;
  line-height:1.6;
}

.link-row{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}

.brand-row{
  margin-top:6px;
}
  .brand-row{
    text-align:center;
    margin-top:4px;
        }
</style>

<script>
(function(){
  const DISCOVERY = "https://discovery.jsl-ian.com/?q=";

  function looksLikeURL(q){
    if (/^https?:\/\//i.test(q)) return true;
    if (/^localhost(:\d+)?(\/.*)?$/i.test(q)) return true;
    if (/^(\d{1,3}\.){3}\d{1,3}(:\d+)?(\/.*)?$/.test(q)) return true;
    if (/^[^\s]+\.[a-z]{2,}([\/?#:].*)?$/i.test(q)) return true;
    return false;
  }

  function openOmega(q){
    q = q.trim();
    if (!q) return;
    if (looksLikeURL(q)) {
      if (!/^https?:\/\//i.test(q)) q = "https://" + q;
      window.location.href = q;
    } else {
      window.location.href = DISCOVERY + encodeURIComponent(q);
    }
  }

  document.getElementById("omegaForm").addEventListener("submit", function(e){
    e.preventDefault();
    openOmega(document.getElementById("omegaInput").value);
  });
})();
</script>
