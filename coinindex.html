<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>JSL-ian Technologies</title>
<meta name="description" content="JSL-ian Technologies homepage and coin account gateway.">
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0;width:100%;min-height:100%;background:#fff;color:#4b5563;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans",sans-serif}body{display:flex;flex-direction:column;align-items:center}.wrap{width:100%;max-width:760px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 18px 18px}.brand{font-size:44px;line-height:1;font-weight:800;letter-spacing:-1.6px;color:#111827;text-align:center}.tm{font-size:15px;font-weight:700;vertical-align:super;margin-left:3px;color:#6b7280}.mark{margin-top:6px;text-align:center;font-size:13px;color:#6b7280}.slogan{margin-top:18px;text-align:center;font-size:17px;color:#374151}.search{margin-top:28px;width:100%;max-width:620px;border:1px solid #d1d5db;border-radius:999px;display:flex;align-items:center;padding:9px 12px;box-shadow:0 1px 7px rgba(0,0,0,.08);background:#fff}.search input{flex:1;border:0;outline:0;font-size:17px;padding:9px 10px;color:#111827;background:transparent}.search button{border:0;background:#111827;color:#fff;border-radius:999px;padding:10px 17px;font-size:14px;font-weight:650;cursor:pointer}.coinlinks{margin-top:18px;display:flex;gap:18px;justify-content:center;flex-wrap:wrap}.coinlinks a{font-size:15px;color:#2563eb;text-decoration:none;font-weight:650}.coinlinks a:hover{text-decoration:underline}.copy{margin-top:13px;text-align:center;font-size:12px;line-height:1.45;color:#6b7280}.footer{margin-top:auto;padding-top:24px;text-align:center;font-size:12px;color:#9ca3af}@media(max-width:520px){.brand{font-size:38px}.search{padding:7px 8px}.search input{font-size:16px}.search button{padding:9px 13px}.coinlinks{gap:14px}}
</style>
</head>
<body>
<main class="wrap">
  <div class="brand">JSL-ian<span class="tm">™</span></div>
  <div class="mark">JSL-ian Technologies</div>
  <div class="slogan">From Ω to intelligent connection.</div>

  <form class="search" id="browserForm" autocomplete="off">
    <input id="q" name="q" placeholder="Search or enter website" autofocus>
    <button type="submit">Go</button>
  </form>

  <nav class="coinlinks" aria-label="Coin account links">
    <a href="coin.html#signin">Coin Sign In</a>
    <a href="coin.html#signup">Coin Sign Up</a>
  </nav>

  <div class="copy">© 2026 JSL-ian Technologies. All rights reserved.<br>JSL-ian™ and JSLΩ™ are trademarks of JSL-ian Technologies.</div>
  <div class="footer">coin.jsl-ian.com</div>
</main>
<script>
(function(){
  const form=document.getElementById('browserForm');
  const q=document.getElementById('q');
  function looksLikeURL(s){return /^(https?:\/\/)?([a-z0-9-]+\.)+[a-z]{2,}([\/:?#].*)?$/i.test(s)||/^localhost(:\d+)?/i.test(s)}
  form.addEventListener('submit',function(e){
    e.preventDefault();
    const v=q.value.trim();
    if(!v) return;
    if(looksLikeURL(v)){
      const url=/^https?:\/\//i.test(v)?v:'https://'+v;
      window.location.href=url;
    }else{
      window.location.href='https://discovery.jsl-ian.com/?q='+encodeURIComponent(v);
    }
  });
})();
</script>
</body>
</html>
