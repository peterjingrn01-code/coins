<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Owner · JSLCoin Omega</title><link rel="stylesheet" href="style.css"></head>
<body><div id="siteHeader"></div><main>
<div id="ownerOnly"><h2>Owner Console</h2><section class="grid"><div class="card stat"><div class="label">Owner</div><div id="ownerEmail" class="value">—</div></div><div class="card stat"><div class="label">Total Supply</div><div id="supply" class="value">—</div></div><div class="card stat"><div class="label">Users</div><div id="users" class="value">—</div></div><div class="card stat"><div class="label">Wallets</div><div id="wallets" class="value">—</div></div><div class="card stat"><div class="label">Omega Link</div><div id="omegaEndpoint" class="value">—</div></div></section><section class="grid2"><div class="card"><h3>Mint</h3><form id="mintForm"><input id="mintTo" placeholder="To email, phone, or wallet" required><input id="mintAmount" type="number" min="1" step="1" placeholder="Amount" required><button class="btn green" type="submit">Mint</button></form></div><div class="card"><h3>Burn</h3><form id="burnForm"><input id="burnAmount" type="number" min="1" step="1" placeholder="Amount from owner wallet" required><button class="btn red" type="submit">Burn</button></form></div></section><h3>Users</h3><div class="tablewrap"><table><thead><tr><th>Email</th><th>Phone</th><th>Name</th><th>Role</th><th>Balance</th><th>Wallet</th></tr></thead><tbody id="userBody"></tbody></table></div></div>
</main><div id="siteFooter"></div><script src="config.js"></script><script src="app.js"></script><script>JSLOmega.initOwner();</script></body></html>
