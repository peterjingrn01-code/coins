<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JSL-ian Owner Console</title><style>body{font-family:Arial,sans-serif;margin:0;background:#f6f8fb;color:#111}.wrap{max-width:920px;margin:0 auto;padding:24px}.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:18px;margin:14px 0;box-shadow:0 2px 10px #00000008}button{border:0;border-radius:12px;padding:12px 16px;background:#111827;color:white;font-weight:700;margin:6px}input{padding:12px;border:1px solid #d1d5db;border-radius:10px;margin:6px;min-width:220px}pre{background:#0b1020;color:#d1fae5;border-radius:12px;padding:14px;overflow:auto}.brand{font-size:28px;font-weight:800}</style></head><body><div class="wrap"><div class="brand">JSL-ian Owner Console v1.1</div><p>Connected to <b>https://api.jsl-ian.com</b></p><div class="card"><h3>Genesis</h3><input id="ownerKey" placeholder="Owner key (optional on first genesis)"><button onclick="genesis()">Create Omega Coin</button><button onclick="status()">Status</button><button onclick="treasury()">Treasury</button></div><div class="card"><h3>Issue Coins</h3><input id="issueEmail" placeholder="User email"><input id="amount" type="number" placeholder="Amount"><button onclick="issue()">Issue</button></div><div class="card"><h3>Network</h3><button onclick="users()">Users</button><button onclick="txs()">Transactions</button><button onclick="tables()">Tables</button></div><pre id="out">Ready.</pre></div><script>const API='https://api.jsl-ian.com';const out=x=>document.getElementById('out').textContent=typeof x==='string'?x:JSON.stringify(x,null,2);async function call(path,opt={}){try{const r=await fetch(API+path,opt);out(await r.json())}catch(e){out('ERROR: '+e.message)}}function status(){call('/status')}function tables(){call('/tables')}function treasury(){call('/treasury')}function users(){call('/users')}function txs(){call('/transactions')}function genesis(){const owner_key=document.getElementById('ownerKey').value;call('/genesis',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({owner_key})})}function issue(){const owner_key=document.getElementById('ownerKey').value;const email=document.getElementById('issueEmail').value;const amount=Number(document.getElementById('amount').value||0);call('/issue',{method:'POST',headers:{'content-type':'application/json','x-owner-key':owner_key},body:JSON.stringify({email,amount})})}status();</script></body></html>
