<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JSLCoin Owner Console</title><link rel="stylesheet" href="style.css"></head><body onload="loadOwner()"><header><div><div class="brand logo">JSLCoin</div><div class="tag">Owner Console</div></div><nav><a href="dashboard.html">Dashboard</a><a href="wallet.html">Wallet</a><a href="transactions.html">Transactions</a><a href="#" onclick="logout()">Logout</a></nav></header><main class="wrap"><h1>Owner Console</h1><div class="grid"><div class="card"><div class="muted">Owner</div><div id="owner" class="small">—</div></div><div class="card"><div class="muted">Total Supply</div><div id="supply" class="big">—</div></div><div class="card"><div class="muted">Users</div><div id="users" class="big">—</div></div><div class="card"><div class="muted">Wallets</div><div id="wallets" class="big">—</div></div></div><div class="grid" style="margin-top:16px"><div class="card"><h2>Mint</h2><input id="mintTo" placeholder="To email, phone, or wallet"><input id="mintAmount" type="number" placeholder="Amount"><button class="green" onclick="mint()">Mint</button></div><div class="card"><h2>Burn</h2><input id="burnAmount" type="number" placeholder="Amount from owner wallet"><button class="danger" onclick="burn()">Burn</button></div><div class="card"><h2>Omega Link</h2><p id="omega" class="small"></p><button class="secondary" onclick="omegaCheck()">Omega Check</button></div></div><h2>Users</h2><table><thead><tr><th>Email</th><th>Phone</th><th>Name</th><th>Role</th><th>Balance</th></tr></thead><tbody id="tbody"></tbody></table></main><script src="config.js"></script><script src="app.js"></script></body></html>
