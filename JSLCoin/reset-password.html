<!doctype html><html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password - JSLCoin Omega</title>
<link rel="stylesheet" href="style.css">
</head><body>
<header class="topbar">
  <div class="brand">
    <img src="assets/logo.png" alt="JSLCoin" class="brand-logo" />
    <div>
      <strong>Reset Password</strong>
      <div>JSLCoin Omega 5.0</div>
    </div>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="wallet-login.html">Sign In</a>
    <a href="userpage.html">Sign Up</a>
  </nav>
</header>

<main class="page">
  <section class="card">
    <h1>Reset Password</h1>
    <p>Enter your username, reset code, and new password.</p>

    <label>Username / Email / Phone</label>
    <input id="resetLogin" placeholder="Username / Email / Phone">

    <label>Reset Code</label>
    <input id="resetCode" placeholder="6-digit reset code">

    <label>New Password</label>
    <input id="newPassword" type="password" placeholder="New password">

    <button onclick="resetPassword()">Reset Password</button>

    <p id="resetMessage"></p>
  </section>
</main>

<footer class="footer">
  © 2026 JSL-ian Technologies. All rights reserved.
</footer>

<script>
async function resetPassword() {
  const login = document.getElementById("resetLogin").value.trim();
  const code = document.getElementById("resetCode").value.trim();
  const password = document.getElementById("newPassword").value;
  const msg = document.getElementById("resetMessage");

  if (!login || !code || !password) {
    msg.textContent = "Please enter login, reset code, and new password.";
    return;
  }

  try {
    const r = await fetch("https://jslcoin-api.peterjingrn01.workers.dev/reset-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ login, code, password })
    });

    const d = await r.json();
    msg.textContent = d.message || d.error;

    if (d.ok) {
      setTimeout(() => {
        window.location.href = "wallet-login.html";
      }, 1200);
    }
  } catch (e) {
    msg.textContent = e.message;
  }
}
</script>
</body></html>
