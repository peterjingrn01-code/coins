<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>JSLCoin</title>
<meta name="description" content="JSLCoin — The first coin of JSL-ian Technologies.">
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#f8fafc;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center}
a{color:inherit;text-decoration:none}
.page{width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 18px 28px}
.card{width:100%;max-width:760px;text-align:center;margin:auto}
.logoLink{display:inline-block;margin:0 auto 26px}
.logo{width:min(64vw,360px);max-width:360px;height:auto;display:block;border-radius:18px;box-shadow:0 20px 55px rgba(15,23,42,.08)}
.logoHint{font-size:16px;color:#6b7280;margin:0 0 34px}
h1{font-size:clamp(64px,13vw,118px);line-height:.92;margin:0 0 20px;font-weight:900;letter-spacing:-.065em;color:#05070b}
.subtitle{font-size:clamp(22px,4.5vw,36px);line-height:1.25;margin:0 0 42px;color:#6b7280;font-weight:500}
.actions{display:grid;gap:22px;width:min(90vw,560px);margin:0 auto 42px}
.action{display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:78px;padding:0 34px;border-radius:22px;background:#111827;color:#fff;font-size:clamp(24px,5vw,34px);font-weight:850;box-shadow:0 14px 30px rgba(15,23,42,.16)}
.action span:first-child{font-size:30px;opacity:.95}
.action span:last-child{font-size:38px;line-height:1}
.action:hover{transform:translateY(-1px);box-shadow:0 18px 38px rgba(15,23,42,.20)}
.portal{font-size:20px;color:#6b7280;margin:0 0 26px}
.footer{color:#6b7280;text-align:center;font-size:16px;line-height:1.6;margin-top:auto}
.footer a{color:#2563eb;font-weight:700}
@media(max-width:560px){
  .page{padding:28px 16px 24px}
  .logo{width:min(72vw,300px)}
  .logoHint{font-size:14px;margin-bottom:28px}
  .subtitle{margin-bottom:34px}
  .actions{gap:16px;margin-bottom:36px}
  .action{min-height:68px;border-radius:18px;padding:0 24px}
  .action span:first-child{font-size:25px}
  .action span:last-child{font-size:31px}
  .portal{font-size:18px}
  .footer{font-size:14px}
}
</style>
