<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JSL-ian User Console</title><style>body{font-family:Arial,sans-serif;margin:0;background:#fff;color:#111}.wrap{max-width:820px;margin:0 auto;padding:24px}.card{border:1px solid #e5e7eb;border-radius:16px;padding:18px;margin:14px 0}button{border:0;border-radius:12px;padding:12px 16px;background:#2563eb;color:white;font-weight:700;margin:6px}input{padding:12px;border:1px solid #d1d5db;border-radius:10px;margin:6px;min-width:220px}pre{background:#111827;color:#e5e7eb;border-radius:12px;padding:14px;overflow:auto}.brand{font-size:28px;font-weight:800}</style></head><body><div class="wrap"><div class="brand">JSL-ian User Console v1.1</div><p>Connected to <b>https://api.jsl-ian.com</b></p><div class="card"><h3>Register</h3><input id="username" placeholder="Username"><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button onclick="register()">Register</button><button onclick="login()">Login</button><button onclick="wallet()">Wallet</button></div><div class="card"><h3>Transfer</h3><input id="toEmail" placeholder="To email"><input id="transferAmount" type="number" placeholder="Amount"><button onclick="transfer()">Transfer</button><button onclick="txs()">History</button></div><pre id="out">Ready.</pre></div><script>const API='https://api.jsl-ian.com';const out=x=>document.getElementById('out').textContent=typeof x==='string'?x:JSON.stringify(x,null,2);async function call(path,opt={}){try{const r=await fetch(API+path,opt);out(await r.json())}catch(e){out('ERROR: '+e.message)}}function register(){call('/register',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({username:username.value,email:email.value,password:password.value})})}function login(){call('/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email:email.value,password:password.value})})}function wallet(){call('/wallet?email='+encodeURIComponent(email.value))}function transfer(){call('/transfer',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({from_email:email.value,to_email:toEmail.value,amount:Number(transferAmount.value||0)})})}function txs(){call('/transactions')}</script></body></html>
