<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>JSL-ian Dashboard</title>
<style>
*{box-sizing:border-box} body{margin:0;background:#f8fafc;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.page{min-height:100vh;padding:20px}.shell{max-width:980px;margin:0 auto}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}.brand{font-size:22px;font-weight:800;letter-spacing:-.3px}.profile{width:42px;height:42px;border-radius:50%;border:1px solid #d1d5db;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}.search{margin:0 auto 24px;max-width:620px;background:#fff;border:1px solid #d1d5db;border-radius:999px;box-shadow:0 12px 35px rgba(15,23,42,.08);display:flex;align-items:center;padding:7px 8px 7px 18px}.search input{border:0;outline:0;flex:1;font-size:17px;padding:13px;background:transparent}.search button{border:0;border-radius:999px;background:#111827;color:#fff;padding:12px 20px;font-weight:800;font-size:15px}.quick{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:26px}.chip{border:1px solid #d1d5db;background:#fff;border-radius:16px;padding:13px 18px;font-weight:800;color:#111827;text-decoration:none}.panel{background:#fff;border:1px solid #e5e7eb;border-radius:28px;box-shadow:0 24px 70px rgba(15,23,42,.08);overflow:hidden}.panelHead{padding:22px 24px;border-bottom:1px solid #eef2f7;display:flex;justify-content:space-between;gap:12px;align-items:center}.panelHead h1{font-size:24px;margin:0}.muted{color:#6b7280}.tableWrap{overflow-x:auto}.assetTable{width:100%;border-collapse:collapse;min-width:720px}.assetTable th,.assetTable td{padding:16px 18px;border-bottom:1px solid #eef2f7;text-align:left;font-size:15px}.assetTable th{color:#6b7280;font-size:13px;text-transform:uppercase;letter-spacing:.04em}.coin{font-weight:900}.balance{font-weight:900;font-size:18px}.action{border:1px solid #d1d5db;border-radius:999px;padding:8px 13px;background:#fff;font-weight:800}.action.primary{background:#111827;color:#fff;border-color:#111827}.footer{display:flex;justify-content:center;gap:18px;margin:24px 0}.footer a{color:#2563eb;text-decoration:none;font-weight:700}@media(max-width:620px){.page{padding:16px}.brand{font-size:19px}.panelHead{align-items:flex-start;flex-direction:column}.search input{font-size:15px}.search button{padding:11px 15px}.chip{flex:1;text-align:center}.assetTable th,.assetTable td{padding:14px 12px}}
</style>
</head>
<body>
<div class="page"><div class="shell">
  <header class="top"><a class="brand" href="/">Dashboard</a><a class="profile" href="profile.html" title="Profile">P</a></header>
  <form class="search" id="searchForm"><input id="searchInput" placeholder="Search coins or projects"><button>Go</button></form>
  <nav class="quick"><button class="chip" type="button" onclick="showCoins()">Coins ▼</button><button class="chip" type="button" onclick="showProjects()">Projects ▼</button><a class="chip" href="ownerpage.html">Owner</a><a class="chip" href="/">Home</a></nav>
  <section class="panel">
    <div class="panelHead"><div><h1>Transaction Dashboard</h1><div class="muted">Your coins, balances, actions, and notes in one place.</div></div><div class="muted" id="userLabel">JSL-ian Account</div></div>
    <div class="tableWrap"><table class="assetTable"><thead><tr><th>Coin</th><th>Date</th><th>Balance</th><th>Sell</th><th>Buy</th><th>Note</th></tr></thead><tbody id="coinRows"></tbody></table></div>
  </section>
  <div class="footer"><a href="/">Home</a><a href="https://discovery.jsl-ian.com/">Discovery</a><a href="#" onclick="signOut();return false;">Sign Out</a></div>
</div></div>
<script>
const coins=[
 {name:'JSL Coin',key:'jsl',balance:'—',note:'Genesis coin of JSL Platform'},
 {name:'Ziran',key:'ziran',balance:'—',note:'Coming soon'},
 {name:'AI',key:'ai',balance:'—',note:'Coming soon'},
 {name:'Synapse',key:'synapse',balance:'—',note:'Coming soon'}
];
function row(c){return `<tr><td class="coin">${c.name}</td><td>${new Date().toLocaleDateString()}</td><td class="balance">${c.balance}</td><td><button class="action">Sell</button></td><td><button class="action primary">Buy</button></td><td>${c.note}</td></tr>`}
function showCoins(){document.getElementById('coinRows').innerHTML=coins.map(row).join('')}
function showProjects(){document.getElementById('coinRows').innerHTML=[
 {name:'Discovery',balance:'Project',note:'Search and discovery system'},
 {name:'JSL Social',balance:'Project',note:'Community and support'},
 {name:'JSL Products',balance:'Project',note:'Member products and services'}
].map(row).join('')}
function signOut(){sessionStorage.clear(); location.href='coin.html'}
document.getElementById('searchForm').addEventListener('submit',e=>{e.preventDefault(); const q=document.getElementById('searchInput').value.trim(); if(q){sessionStorage.setItem('OMEGA_DASHBOARD_SEARCH',JSON.stringify({source:'DASHBOARD',target:'DISCOVERY',query:q,intent:'SEARCH',time:new Date().toISOString()})); location.href='https://discovery.jsl-ian.com/?q='+encodeURIComponent(q)}});
showCoins();
</script>
</body></html>
