<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password - JSLCoin Omega</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/logo.png" alt="JSLCoin" class="brand-logo" />
      <div>
        <strong>Forgot Password</strong>
        <div>JSLCoin Omega 5.0</div>
      </div>
    </div>
    <nav>
<a href="index.html">Home</a>
<a href="wallet-login.html">Sign In</a>
<a href="userpage.html">Sign Up</a>
      
    </nav>
  </header>

  <main class="page">
    <section class="card">
      <h1>Reset Password</h1>
      <p>Enter your username, email, or phone number.</p>

      <input id="resetLogin" placeholder="Username / Email / Phone" />

      <button onclick="requestReset()">Send Reset Code</button>

      <p id="resetMessage"></p>
    </section>
  </main>

  <footer class="footer">
    © 2026 JSL-ian Technologies. All rights reserved.
  </footer>

  <script>
    async function requestReset() {
    const login = document.getElementById("resetLogin").value.trim();
    const msg = document.getElementById("resetMessage");

    if (!login) {
        msg.textContent = "Please enter username, email, or phone.";
        return;
    }

    try {
        const r = await fetch(API + "/forgot-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ login })
        });

        const d = await r.json();
        msg.textContent = d.message || d.error;

    } catch (e) {
        msg.textContent = e.message;
    }
    }


  </script>
</body>
</html>
