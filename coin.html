<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>JSLCoins Account</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#fff;color:#202124;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:460px;border:1px solid #e5e7eb;border-radius:22px;padding:28px;box-shadow:0 18px 50px rgba(0,0,0,.08)}
.brand{text-align:center;font-size:28px;font-weight:700;margin-bottom:6px}
.sub{text-align:center;color:#6b7280;margin-bottom:22px}
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tabs button{flex:1;border:1px solid #e5e7eb;background:#f9fafb;padding:12px;border-radius:12px;font-weight:600}
.tabs button.active{background:#111827;color:#fff}
form{display:none}
form.active{display:block}
input{width:100%;padding:14px;border:1px solid #d1d5db;border-radius:12px;margin:8px 0;font-size:16px}
.action{width:100%;padding:14px;border:0;border-radius:12px;background:#111827;color:#fff;font-size:16px;font-weight:700;margin-top:10px}
.result{margin-top:18px;padding:14px;border-radius:14px;background:#f3f4f6;color:#111827;white-space:pre-wrap;font-size:14px}
.links{text-align:center;margin-top:18px}
.links a{color:#2563eb;text-decoration:none;margin:0 8px}
</style>
</head>
<body>
<div class="page">
<section class="card">
<div class="brand">JSLCoins</div>
<div class="sub">Create and access your JSL-ian Account</div>

<div class="tabs">
<button id="signupTab" class="active">Create Account</button>
<button id="signinTab">Sign In</button>
<button id="walletTab">Wallet</button>
</div>

<form id="signupForm" class="active">
<input id="signupUsername" required placeholder="Username">
<input id="signupEmail" required type="email" placeholder="Email">
<input id="signupPassword" required type="password" placeholder="Password">
<button class="action" type="submit">Create JSL-ian Account</button>
</form>

<form id="signinForm">
<input id="signinEmail" required type="email" placeholder="Email">
<input id="signinPassword" required type="password" placeholder="Password">
<button class="action" type="submit">Sign In</button>
</form>

<form id="walletForm">
<input id="walletEmail" required type="email" placeholder="Email">
<button class="action" type="submit">Open Wallet</button>
</form>

<div id="result" class="result">Ready.</div>

<div class="links">
<a href="index.html">Home</a>
<a href="https://api.jsl-ian.com" target="_blank">API</a>
</div>
</section>
</div>

<script>
const API="https://api.jsl-ian.com";
const result=document.getElementById("result");

function show(tab){
for(const id of ["signup","signin","wallet"]){
document.getElementById(id+"Form").classList.remove("active");
document.getElementById(id+"Tab").classList.remove("active");
}
document.getElementById(tab+"Form").classList.add("active");
document.getElementById(tab+"Tab").classList.add("active");
result.textContent="Ready.";
}

signupTab.onclick=()=>show("signup");
signinTab.onclick=()=>show("signin");
walletTab.onclick=()=>show("wallet");

async function call(path,data){
const res=await fetch(API+path,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});
return await res.json();
}

signupForm.onsubmit=async e=>{
e.preventDefault();
result.textContent="Creating account...";
const data=await call("/register",{
username:signupUsername.value,
email:signupEmail.value,
password:signupPassword.value
});
result.textContent=JSON.stringify(data,null,2);
};

signinForm.onsubmit=async e=>{
e.preventDefault();
result.textContent="Signing in...";
const data=await call("/login",{
email:signinEmail.value,
password:signinPassword.value
});
result.textContent=JSON.stringify(data,null,2);
};

walletForm.onsubmit=async e=>{
e.preventDefault();
result.textContent="Opening wallet...";
const email=encodeURIComponent(walletEmail.value);
const res=await fetch(API+"/wallet?email="+email);
const data=await res.json();
result.textContent=JSON.stringify(data,null,2);
};
</script>
</body>
</html>
